name: Build Android APK

# Produces a real, installable CibilBazaar Dialer .apk automatically — no
# local Android Studio / SDK setup needed. Runs on GitHub's hosted
# ubuntu-latest runner with the Android SDK + Gradle installed for you.
#
# HOW TO USE:
#   1. Push this whole repo to GitHub (same steps as build-desktop.yml).
#   2. Go to the "Actions" tab — this runs automatically on every push to
#      main, or trigger it manually with "Run workflow".
#   3. Download the "CibilBazaarDialer-Android-Debug-APK" artifact when it
#      finishes (~5-8 min) — that's your real, installable .apk. Copy it to
#      your phone and tap to install (enable "Install from unknown sources"
#      the first time, since this isn't from the Play Store).
#
# This builds the DEBUG apk, which is directly installable and fully
# functional for internal/business use. For a signed RELEASE apk, add
# these repository secrets (Settings > Secrets and variables > Actions >
# Secrets tab):
#   ANDROID_KEYSTORE_BASE64   (base64 of your .keystore file)
#   ANDROID_KEYSTORE_PASSWORD
#   ANDROID_KEY_ALIAS
#   ANDROID_KEY_PASSWORD
# then ALSO add a repository VARIABLE (same page, "Variables" tab):
#   HAS_SIGNING = true
# (GitHub Actions doesn't allow checking whether a secret exists inside a
# job-level `if:`, so this variable is the on/off switch for the release
# job below — flip it to true once the four secrets above are set, then
# re-run the workflow.)

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/build-android.yml"
  workflow_dispatch: {}

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CibilBazaarDialer-Android-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  build-release-apk:
    runs-on: ubuntu-latest
    needs: build-debug-apk
    if: ${{ vars.HAS_SIGNING == 'true' }}
    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore signing keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > cibilbazaar-release.keystore
          cat > keystore.properties << EOF
          storeFile=../cibilbazaar-release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build signed release APK
        run: gradle assembleRelease --no-daemon

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CibilBazaarDialer-Android-Release-APK
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
